function ReparacionesPanel({ equipos, seccionales, username }) {
  const [items,    setItems]    = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [modal,    setModal]    = useState(null);
  const [filterEst,setFilterEst]= useState("");
  const [filterSec,setFilterSec]= useState("");
  const [search,   setSearch]   = useState("");

  const load = useCallback(async()=>{
    setLoading(true);
    const {data}=await sb.from("reparaciones").select("*").order("created_at",{ascending:false});
    setItems(data||[]);
    setLoading(false);
  },[]);
  useEffect(()=>{load();},[load]);

  async function handleSave(form) {
    if (modal==="new") await sb.from("reparaciones").insert([{...form,usuario_carga:username}]);
    else await sb.from("reparaciones").update(form).eq("id",modal.id);
    setModal(null); load();
  }
  async function handleDelete(id) {
    if (!confirm("¿Eliminar esta reparación?")) return;
    await sb.from("reparaciones").delete().eq("id",id);
    setModal(null); load();
  }

  const list = items.filter(e=>{
    const q=search.toLowerCase();
    const mq=!q||[e.equipo_nombre,e.descripcion,e.tecnico].some(v=>(v||"").toLowerCase().includes(q));
    const mSec=!filterSec||String(e.seccional_id)===filterSec;
    return mq&&(!filterEst||e.estado===filterEst)&&mSec;
  });

  const totalCosto = list.filter(e=>e.costo).reduce((s,e)=>s+parseFloat(e.costo),0);

  return (
    <div className="panel-wrap">
      <div className="toolbar" style={{padding:"16px 0"}}>
        <div className="search-wrap" style={{maxWidth:280}}>
          <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input className="search-input" placeholder="Buscar equipo, técnico..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <select className="select-filter" value={filterSec} onChange={e=>setFilterSec(e.target.value)}>
          <option value="">Todas las seccionales</option>
          {seccionales.map(s=><option key={s.id} value={String(s.id)}>{s.nombre}</option>)}
        </select>
        <select className="select-filter" value={filterEst} onChange={e=>setFilterEst(e.target.value)}>
          <option value="">Todos los estados</option>
          {Object.entries(REP_ESTADOS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
        </select>
        <div style={{flex:1}}/>
        {totalCosto>0 && <span style={{fontSize:12,color:"var(--text2)",fontFamily:"var(--mono)"}}>Total: ${totalCosto.toFixed(2)}</span>}
        <button className="btn btn-primary" onClick={()=>setModal("new")}>+ Nueva reparación</button>
      </div>

      {loading ? <div className="center-msg">Cargando...</div> : (
        <div style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",overflow:"hidden",boxShadow:"var(--shadow)"}}>
          {list.length===0 ? <div className="center-msg">No hay reparaciones registradas</div> :
          list.map(r=>{
            const est = REP_ESTADOS[r.estado]||REP_ESTADOS.pendiente;
            const sec = seccionales.find(s=>s.id===r.seccional_id);
            return (
              <div key={r.id} style={{display:"flex",gap:14,padding:"14px 18px",borderBottom:"1px solid var(--border)",alignItems:"flex-start",cursor:"pointer"}} onClick={()=>setModal(r)}>
                <div style={{fontSize:24,lineHeight:1,marginTop:2}}>🔧</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:4,flexWrap:"wrap"}}>
                    <span style={{fontWeight:600,fontSize:14}}>{r.equipo_nombre||"Equipo sin nombre"}</span>
                    <span style={{fontSize:11,padding:"2px 9px",borderRadius:999,background:est.bg,color:est.color,fontWeight:600}}>{est.label}</span>
                    {sec && <span style={{fontSize:11,color:"var(--text3)"}}>📍 {sec.nombre}</span>}
                    {r.costo && <span style={{fontSize:12,color:"var(--text2)",fontFamily:"var(--mono)"}}>$ {parseFloat(r.costo).toFixed(2)}</span>}
                  </div>
                  <div style={{fontSize:13,color:"var(--text2)",marginBottom:3}}>{r.descripcion}</div>
                  <div style={{fontSize:11,color:"var(--text3)",display:"flex",gap:14,flexWrap:"wrap"}}>
                    {r.tecnico       && <span>👨‍🔧 {r.tecnico}</span>}
                    {r.fecha_entrada && <span>📥 {fmtDate(r.fecha_entrada)}</span>}
                    {r.fecha_salida  && <span>📤 {fmtDate(r.fecha_salida)}</span>}
                    <span style={{marginLeft:"auto"}}>{fmtDate(r.created_at)}</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {modal && <RepModal rep={modal==="new"?null:modal} equipos={equipos} seccionales={seccionales} onSave={handleSave} onClose={()=>setModal(null)}/>}
    </div>
  );
}

// ── Dashboard ────────────────────────────────────────────
function Dashboard({ username, isAdmin, qrEquipo }) {
  const [equipos,setEquipos]         = useState([]);
  const [seccionales,setSeccionales] = useState([]);
  const [historialAll,setHistorialAll] = useState([]);
  const [loading,setLoading]         = useState(true);
  const [search,setSearch]           = useState("");
  const [filterOS,setFilterOS]       = useState("");
  const [filterEst,setFilterEst]     = useState("");
  const [filterSec,setFilterSec]     = useState("");
  const [sortCol,setSortCol]         = useState("nombre");
  const [sortAsc,setSortAsc]         = useState(true);
  const [modal,setModal]             = useState(null);
  const [tab,setTab]                 = useState("equipos");
  const [dark,setDark]               = useState(()=>localStorage.getItem("darkMode")==="1");
  const [showPassModal,setShowPassModal] = useState(false);
  const [showImport,setShowImport]   = useState(false);

  useEffect(()=>{
    document.body.classList.toggle("dark", dark);
    localStorage.setItem("darkMode", dark?"1":"0");
  },[dark]);

  const loadSeccionales = useCallback(async()=>{
    const {data}=await sb.from("seccionales").select("*").order("nombre");
    setSeccionales(data||[]);
  },[]);

  const loadEquipos = useCallback(async()=>{
    setLoading(true);
    const {data}=await sb.from("equipos").select("*").order("nombre");
    setEquipos(data||[]);
    setLoading(false);
  },[]);

  const loadHistorialAll = useCallback(async()=>{
    const {data}=await sb.from("historial").select("equipo_id,descripcion");
    setHistorialAll(data||[]);
  },[]);

  const loadAll = useCallback(()=>{ loadSeccionales(); loadEquipos(); loadHistorialAll(); },[loadSeccionales,loadEquipos,loadHistorialAll]);
  useEffect(()=>{ loadAll(); },[loadAll]);

  // Auto-abrir ficha si viene de QR
  useEffect(()=>{
    if (qrEquipo && equipos.length>0) {
      const eq = equipos.find(e=>String(e.id)===String(qrEquipo));
      if (eq) openEdit(eq);
    }
  },[qrEquipo, equipos]);

  async function openEdit(e) {
    const {data:hist}=await sb.from("historial").select("*").eq("equipo_id",e.id).order("fecha",{ascending:false});
    setModal({equipo:e,historial:hist||[]});
  }

  async function handleSave(form,obs) {
    if (modal==="new") {
      const {data:eq}=await sb.from("equipos").insert([form]).select().single();
      if (obs&&eq) await sb.from("historial").insert([{equipo_id:eq.id,descripcion:obs,usuario:username}]);
      await logActivity(username,"Creó equipo",form.nombre,"equipos",eq?.id);
    } else {
      await sb.from("equipos").update(form).eq("id",modal.equipo.id);
      if (obs) await sb.from("historial").insert([{equipo_id:modal.equipo.id,descripcion:obs,usuario:username}]);
      await logActivity(username,"Editó equipo",form.nombre,"equipos",modal.equipo.id);
    }
    setModal(null); loadEquipos(); loadHistorialAll();
  }

  async function handleDelete(id) {
    if (!confirm("¿Eliminar este equipo?")) return;
    const eq=equipos.find(e=>e.id===id);
    await sb.from("historial").delete().eq("equipo_id",id);
    await sb.from("equipos").delete().eq("id",id);
    await logActivity(username,"Eliminó equipo",eq?.nombre,"equipos",id);
    setModal(null); loadEquipos(); loadHistorialAll();
  }

  async function handlePDF(e) {
    const {data:hist}=await sb.from("historial").select("*").eq("equipo_id",e.id).order("fecha",{ascending:false});
    const sec=seccionales.find(s=>s.id===e.seccional_id)||null;
    printPC(e,sec,hist||[]);
    await logActivity(username,"Imprimió ficha PDF",e.nombre,"equipos",e.id);
  }

  function doSort(col){ if(sortCol===col)setSortAsc(a=>!a); else{setSortCol(col);setSortAsc(true);} }
  const Th=({col,children})=>(
    <th onClick={()=>doSort(col)}>{children} {sortCol===col?(sortAsc?"↑":"↓"):<span style={{opacity:.3}}>↕</span>}</th>
  );

  // Búsqueda global — equipos + historial
  let list=equipos.filter(e=>{
    const q=search.toLowerCase();
    if (!q) return (!filterOS||e.so===filterOS)&&(!filterEst||e.estado===filterEst)&&(!filterSec||String(e.seccional_id)===filterSec);
    const enCampos=[e.nombre,e.usuario,e.ip,e.mail,e.cpu,e.so,e.madre,e.monitor,e.antivirus].some(v=>(v||"").toLowerCase().includes(q));
    const enHistorial=historialAll.filter(h=>h.equipo_id===e.id).some(h=>(h.descripcion||"").toLowerCase().includes(q));
    const mq=enCampos||enHistorial;
    return mq&&(!filterOS||e.so===filterOS)&&(!filterEst||e.estado===filterEst)&&(!filterSec||String(e.seccional_id)===filterSec);
  });
  list=[...list].sort((a,b)=>{
    const av=(a[sortCol]||"").toString().toLowerCase();
    const bv=(b[sortCol]||"").toString().toLowerCase();
    return sortAsc?av.localeCompare(bv):bv.localeCompare(av);
  });

  const total=equipos.length, ok=equipos.filter(e=>e.estado==="ok").length,
    warn=equipos.filter(e=>e.estado==="warn").length, off=equipos.filter(e=>e.estado==="off").length,
    sinBk=equipos.filter(e=>e.backup==="NO").length;

  // Resaltar coincidencia en búsqueda
  function hl(text) {
    if (!search||!text) return text||"";
    const idx=(text||"").toLowerCase().indexOf(search.toLowerCase());
    if (idx<0) return text;
    return <span>{text.slice(0,idx)}<mark style={{background:"#fef08a",borderRadius:2,padding:"0 1px"}}>{text.slice(idx,idx+search.length)}</mark>{text.slice(idx+search.length)}</span>;
  }

  return (
    <div className="app">
      <div className="topbar">
        <div className="topbar-brand">
          <span className="org">Obra Social Textiles</span>
          <span className="title">Inventario de equipos</span>
        </div>
        <div className="topbar-sep"/>
        <span className="topbar-user">{username}</span>
        <span className={`topbar-role ${isAdmin?"role-admin":"role-user"}`}>{isAdmin?"Admin":"Usuario"}</span>
        <button className="btn btn-sm btn-dark" title={dark?"Modo claro":"Modo oscuro"} onClick={()=>setDark(d=>!d)}>{dark?"☀️":"🌙"}</button>
        <button className="btn btn-sm" onClick={()=>setShowPassModal(true)} title="Cambiar contraseña">🔑</button>
        <button className="btn btn-sm" onClick={()=>sb.auth.signOut()}>Salir</button>
      </div>

      <div className="nav-tabs">
        <button className={`nav-tab${tab==="equipos"?" active":""}`} onClick={()=>setTab("equipos")}>PCs</button>
        <button className={`nav-tab${tab==="otros"?" active":""}`} onClick={()=>setTab("otros")}>Otros equipos</button>
        <button className={`nav-tab${tab==="reparaciones"?" active":""}`} onClick={()=>setTab("reparaciones")}>Reparaciones</button>
        <button className={`nav-tab${tab==="seccionales"?" active":""}`} onClick={()=>setTab("seccionales")}>Seccionales</button>
        {isAdmin&&<button className={`nav-tab${tab==="usuarios"?" active":""}`} onClick={()=>setTab("usuarios")}>Usuarios</button>}
        {isAdmin&&<button className={`nav-tab${tab==="log"?" active":""}`} onClick={()=>setTab("log")}>Actividad</button>}
      </div>

      {tab==="usuarios"      && <UsersPanel currentUsername={username}/>}
      {tab==="seccionales"   && <SeccionalesPanel seccionales={seccionales} equipos={equipos} onReload={loadAll}/>}
      {tab==="log"           && <LogPanel/>}
      {tab==="otros"         && <OtrosEquiposPanel seccionales={seccionales} username={username}/>}
      {tab==="reparaciones"  && <ReparacionesPanel equipos={equipos} seccionales={seccionales} username={username}/>}
      {tab==="equipos" && (<>
        <div className="stats">
          {[{n:total,l:"Total equipos",c:"var(--text)"},{n:ok,l:"Operativos",c:"var(--green)"},{n:warn,l:"Con alerta",c:"var(--amber)"},{n:off,l:"Inactivos",c:"var(--text2)"},{n:sinBk,l:"Sin backup",c:"var(--red)"}].map(s=>(
            <div key={s.l} className="stat-card"><div className="num" style={{color:s.c}}>{s.n}</div><div className="lbl">{s.l}</div></div>
          ))}
        </div>

        {/* Panel de alertas */}
        {(()=>{
          const win7  = equipos.filter(e=>(e.so||"").includes("Windows 7")).length;
          const sinAv = equipos.filter(e=>!e.antivirus||e.antivirus.toUpperCase()==="NO"||e.antivirus.trim()==="").length;
          const sinBkA= equipos.filter(e=>!e.backup||e.backup.toUpperCase()==="NO").length;
          const sinPw = equipos.filter(e=>!e.passwd||e.passwd.toUpperCase()==="NO").length;
          const garVence = equipos.filter(e=>{ if(!e.fecha_garantia) return false; const d=Math.ceil((new Date(e.fecha_garantia)-new Date())/(1000*60*60*24)); return d>=0&&d<=30; }).length;
          const garVencida= equipos.filter(e=>{ if(!e.fecha_garantia) return false; return new Date(e.fecha_garantia)<new Date(); }).length;
          const total2= equipos.filter(e=>getAlertas(e).length>0).length;
          if (total2===0) return null;
          return (
            <div style={{margin:"0 28px 10px",background:"var(--red-bg)",border:"1px solid #fca5a5",borderRadius:"var(--radius-lg)",padding:"12px 18px",display:"flex",gap:20,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontWeight:600,fontSize:13,color:"var(--red)"}}>⚠️ {total2} equipo{total2!==1?"s":""} con alertas</span>
              {win7>0  && <span style={{fontSize:12,color:"var(--red)"}}>🖥 <b>{win7}</b> Windows 7</span>}
              {sinAv>0 && <span style={{fontSize:12,color:"var(--red)"}}>🛡 <b>{sinAv}</b> sin antivirus</span>}
              {sinBkA>0&& <span style={{fontSize:12,color:"var(--amber)"}}>💾 <b>{sinBkA}</b> sin backup</span>}
              {sinPw>0 && <span style={{fontSize:12,color:"var(--amber)"}}>🔒 <b>{sinPw}</b> sin contraseña</span>}
              {garVence>0  && <span style={{fontSize:12,color:"var(--amber)"}}>📋 <b>{garVence}</b> garantía por vencer</span>}
              {garVencida>0&& <span style={{fontSize:12,color:"var(--red)"}}>📋 <b>{garVencida}</b> garantía vencida</span>}
            </div>
          );
        })()}

        <div className="toolbar">
          <div className="search-wrap" style={{maxWidth:380}}>
            <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input className="search-input" placeholder="Buscar en equipos e historial..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <select className="select-filter" value={filterSec} onChange={e=>setFilterSec(e.target.value)}>
            <option value="">Todas las seccionales</option>
            {seccionales.map(s=><option key={s.id} value={String(s.id)}>{s.nombre}</option>)}
          </select>
          <select className="select-filter" value={filterOS} onChange={e=>setFilterOS(e.target.value)}>
            <option value="">Todos los SO</option>
            {["Windows 10 PRO 64 BITS","Windows 11 PRO","Windows 7","Linux","Otro"].map(o=><option key={o}>{o}</option>)}
          </select>
          <select className="select-filter" value={filterEst} onChange={e=>setFilterEst(e.target.value)}>
            <option value="">Todos los estados</option>
            <option value="ok">Operativo</option>
            <option value="warn">Con alerta</option>
            <option value="off">Inactivo</option>
          </select>
          <div style={{flex:1}}/>
          {search && <span style={{fontSize:12,color:"var(--text3)"}}>{list.length} resultado{list.length!==1?"s":""}</span>}
          <button className="btn" onClick={()=>exportExcel(list,seccionales)}>⬇ Excel</button>
          {isAdmin && <button className="btn" style={{background:"var(--blue-bg)",color:"var(--blue)",borderColor:"#93c5fd"}} onClick={()=>setShowImport(true)}>⬆ Importar</button>}
          <button className="btn btn-primary" onClick={()=>setModal("new")}>+ Nuevo equipo</button>
        </div>
        <div className="table-wrap">
          <table>
            <thead><tr>
              <Th col="nombre">Nombre PC</Th>
              <Th col="usuario">Usuario</Th>
              <th>Procesador</th>
              <Th col="ram">RAM</Th>
              <Th col="disco">Disco</Th>
              <Th col="so">SO</Th>
              <Th col="ip">IP</Th>
              <Th col="seccional_id">Seccional</Th>
              <Th col="estado">Estado</Th>
              <th>Alertas</th>
              <th style={{width:120}}></th>
            </tr></thead>
            <tbody>
              {loading?(
                <tr><td colSpan={10}><div className="center-msg">Cargando equipos...</div></td></tr>
              ):list.length===0?(
                <tr><td colSpan={10}><div className="center-msg">{search?"No se encontraron resultados para esa búsqueda":"No hay equipos cargados"}</div></td></tr>
              ):list.map(e=>{
                const b=badgeInfo(e.estado);
                const sec=seccionales.find(s=>s.id===e.seccional_id);
                const enHist=search&&historialAll.filter(h=>h.equipo_id===e.id).some(h=>(h.descripcion||"").toLowerCase().includes(search.toLowerCase()));
                return (
                  <tr key={e.id}>
                    <td style={{fontWeight:600}}>{hl(e.nombre)}{enHist&&<span title="Encontrado en historial" style={{marginLeft:6,fontSize:10,color:"var(--amber)"}}>📜</span>}</td>
                    <td>{hl(e.usuario)}</td>
                    <td className="td-trunc" title={e.cpu}>{hl(e.cpu)}</td>
                    <td className="td-mono">{e.ram}</td>
                    <td className="td-mono">{e.disco}</td>
                    <td style={{fontSize:11,color:"var(--text2)"}}>{e.so}</td>
                    <td className="td-mono">{hl(e.ip)}</td>
                    <td style={{color:"var(--text2)",fontSize:12}}>{sec?.nombre||"—"}</td>
                    <td><span className={b.cls}>{b.dot&&<span className="dot"/>}{b.label}</span></td>
                    <td>
                      {getAlertas(e).length>0 && (
                        <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:4}}>
                          {getAlertas(e).map(a=>(
                            <span key={a.key} style={{fontSize:10,padding:"1px 6px",borderRadius:999,background:"#fef2f2",color:a.color,border:"1px solid #fca5a5",whiteSpace:"nowrap"}}>{a.msg}</span>
                          ))}
                        </div>
                      )}
                    </td>
                    <td>
                      <div className="row-actions">
                        <button className="btn btn-sm" onClick={()=>openEdit(e)}>Editar</button>
                        <button className="btn btn-sm btn-pdf" onClick={()=>handlePDF(e)}>PDF</button>
                        <button className="btn btn-sm" style={{background:"var(--blue-bg)",color:"var(--blue)",borderColor:"#93c5fd"}} onClick={()=>{ const sec=seccionales.find(s=>s.id===e.seccional_id); printQR(e,sec||null); }} title="Imprimir QR">QR</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {modal&&(
          <EquipoModal
            equipo={modal==="new"?null:modal.equipo}
            historial={modal==="new"?[]:modal.historial}
            seccionales={seccionales}
            currentUser={username}
            onSave={handleSave}
            onDelete={handleDelete}
            onClose={()=>setModal(null)}
          />
        )}
      </>)}
      {showPassModal && <ChangePassModal onClose={()=>setShowPassModal(false)}/>}
      {showImport && <ImportModal seccionales={seccionales} onImport={loadEquipos} onClose={()=>setShowImport(false)}/>}
    </div>
  );
}

// ── Root ─────────────────────────────────────────────────
function App() {
  const [session,setSession]=useState(undefined);
  const [qrEquipo,setQrEquipo]=useState(null);

  useEffect(()=>{
    // Detectar QR deeplink: ?equipo=ID
    const params = new URLSearchParams(window.location.search);
    const eqId = params.get("equipo");
    if (eqId) setQrEquipo(eqId);

    sb.auth.getSession().then(({data})=>setSession(data.session));
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setSession(s));
    return()=>subscription.unsubscribe();
  },[]);

  if (session===undefined) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text3)",fontSize:14}}>Cargando...</div>;
  if (!session) return <Login qrEquipo={qrEquipo}/>;
  const username=session.user.user_metadata?.nombre||emailToUsername(session.user.email);
  const rol=session.user.user_metadata?.rol||(username===ADMIN_USER?"admin":"usuario");
  return <Dashboard username={username} isAdmin={rol==="admin"} qrEquipo={qrEquipo}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
